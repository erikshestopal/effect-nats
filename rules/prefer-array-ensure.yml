id: prefer-array-ensure
language: TypeScript
severity: error
message: "Use Arr.ensure(value) instead of manually checking Arr.isArray(value) ? value : [value]."
files:
  - packages/*/src/**/*.ts
rule:
  any:
    - pattern: "Arr.isArray($VALUE) ? $VALUE : [$VALUE]"
    - pattern: "Array.isArray($VALUE) ? $VALUE : [$VALUE]"
